name: Market Intelligence Briefing

on:
  schedule:
    - cron: "0 7 * * 1-5"   # Morning — Mon to Fri (7am GMT / 8am BST)
    - cron: "0 17 * * 1-5"  # Evening — Mon to Fri (5pm GMT / 6pm BST)
    - cron: "0 8 * * 6"     # Saturday roundup    (8am GMT / 9am BST)
    - cron: "0 8 * * 0"     # Sunday preview      (8am GMT / 9am BST)

  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run briefing script
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          EMAIL_ADDRESS:   ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python briefing.py
